openapi: "3.0.2"
info:
  title: FastID
  version: 0.0.1
  license:
    name: MIT License
    url: https://choosealicense.com/licenses/mit/

paths:
  /api/v1/keys/:
    get:
      tags:
        - Keys
      summary: Verifies encryption and signature keys
      responses:
        200:
          description: "Возращает авторизационную cookie"
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
        - Keys
      summary: Creates a key pair for encryption and signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                count: 1
              properties:
                count:
                  description: Number of keys to decrypt
                  type: integer
      responses:
        200:
          description: Returns the number of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string


  /api/v1/auth/:
    post:
      tags:
        - Auth
      summary: Авторизация и аунтификация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              example:
                username: "admin"
                password: "password"

      responses:
        200:
          description: "Возращает авторизационную cookie"
          content:
            application/json:
              schema:
                type: object

